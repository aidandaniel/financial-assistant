spring:
  application:
    name: financial-assistant-backend
  
  datasource:
    url: jdbc:h2:mem:finsightdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  security:
    jwt:
      secret: finsight-ai-secret-key-for-jwt-token-generation
      expiration: 86400000 # 24 hours
  
  cache:
    type: simple
    cache-names: quiz-questions, user-profiles, learning-recommendations

server:
  port: 8080
  servlet:
    context-path: /api

# Logging
logging:
  level:
    com.finsight: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Custom Properties
finsight:
  quiz:
    default-question-count: 10
    max-question-count: 20
  learning:
    modules-per-level: 10
    completion-threshold: 80
  bank:
    integration:
      enabled: true
      api-timeout: 5000
